<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>macOS Flip Clock & Timer</title>
    <link rel="apple-touch-icon" sizes="180x180" href="favicon/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon/favicon-16x16.png">
    <link rel="icon" href="favicon/favicon.ico" sizes="any">
    <link rel="manifest" href="favicon/site.webmanifest">
    <!-- <script src="https://cdn.tailwindcss.com"></script> -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.1.17"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&display=swap');

        :root {
            --bg-color: #0d0d0d;
            --panel-bg: rgba(255, 255, 255, 0.03);
            --flip-bg: #1a1a1a;
            --flip-text: #e0e0e0;
            --flip-radius: 12px;
            --anim-speed: 0.6s;
            --sep-color: #2a2a2a;
            --text-main: #ffffff;
            --text-dim: #666;

            --unit-h: 110px;
            --unit-w: 75px;
            --font-sz: 80px;
        }

        body.light-theme {
            --bg-color: #f5f5f7;
            --panel-bg: rgba(0, 0, 0, 0.03);
            --flip-bg: #ffffff;
            --flip-text: #1d1d1f;
            --sep-color: #d2d2d7;
            --text-main: #1d1d1f;
            --text-dim: #86868b;
        }

        @media (min-width: 768px) {
            :root {
                --unit-h: 210px;
                --unit-w: 140px;
                --font-sz: 160px;
            }
            body.hide-seconds {
                --unit-h: 260px;
                --unit-w: 180px;
                --font-sz: 200px;
            }
        }

        /* Large Screen / Simulated Fullscreen sizing */
        body.large-view {
            --unit-h: 32vh !important;
            --unit-w: 22vh !important;
            --font-sz: 25vh !important;
            --flip-radius: 28px !important;
        }

        body.large-view.hide-seconds {
            --unit-h: 42vh !important;
            --unit-w: 28vh !important;
            --font-sz: 35vh !important;
            --flip-radius: 36px !important;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-color);
            color: var(--text-main);
            height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            transition: background 0.5s ease, color 0.5s ease;
        }

        .flip-unit {
            position: relative;
            width: var(--unit-w);
            height: var(--unit-h);
            margin: 0 2px;
            border-radius: var(--flip-radius);
            perspective: 1000px;
            transition: width 0.3s ease, height 0.3s ease, box-shadow 0.3s ease;
        }



        @media (min-width: 768px) {
            .flip-unit {
                margin: 0 6px;
            }
        }

        /* Plates */
        .plate {
            position: absolute;
            left: 0;
            width: 100%;
            height: 50%;
            background: var(--flip-bg);
            overflow: hidden;
            display: flex;
            justify-content: center;
            color: var(--flip-text);
            transition: background 0.5s ease, color 0.5s ease;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            transform: translateZ(0);
            backface-visibility: hidden;
        }

        .digit-text {
            position: absolute;
            width: 100%;
            height: var(--unit-h);
            line-height: var(--unit-h);
            text-align: center;
            font-size: var(--font-sz);
            font-weight: 700 !important;
            /* Force bold on both halves */
            left: 0;
            font-variant-numeric: tabular-nums;
            transition: font-size 0.3s ease, line-height 0.3s ease;
        }

        .plate-top {
            top: 0;
            border-radius: var(--flip-radius) var(--flip-radius) 0 0;
            z-index: 1;
            border-bottom: 1px solid rgba(0, 0, 0, 0.1);
        }

        .plate-top .digit-text {
            top: 0;
        }

        .plate-bottom {
            bottom: 0;
            border-radius: 0 0 var(--flip-radius) var(--flip-radius);
            z-index: 0;
        }

        .plate-bottom .digit-text {
            top: 0;
            transform: translateY(-50%);
        }

        /* The Animated Flap */
        .flap {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 50%;
            transform-origin: bottom;
            z-index: 3;
            transform-style: preserve-3d;
            pointer-events: none;
        }

        .flap.flipping {
            animation: flip-down var(--anim-speed) cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        @keyframes flip-down {
            0% {
                transform: rotateX(0deg);
            }

            100% {
                transform: rotateX(-180deg);
            }
        }

        .flap-front,
        .flap-back {
            position: absolute;
            width: 100%;
            height: 100%;
            left: 0;
            top: 0;
            overflow: hidden;
            backface-visibility: hidden;
            background: var(--flip-bg);
            transition: background 0.5s ease;
            transform: translateZ(0);
        }

        .flap-front {
            z-index: 2;
            border-radius: var(--flip-radius) var(--flip-radius) 0 0;
            border-bottom: 1px solid rgba(0, 0, 0, 0.1);
        }

        .flap-back {
            transform: rotateX(180deg);
            border-radius: 0 0 var(--flip-radius) var(--flip-radius);
            border-top: 1px solid rgba(0, 0, 0, 0.1);
        }

        .flap-back .digit-text {
            top: 0;
            transform: translateY(-50%);
        }

        /* Navigation & UI */
        .status-pill {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 10px;
            padding: 4px 8px;
            border-radius: 20px;
            background: var(--panel-bg);
            color: var(--text-dim);
            display: flex;
            align-items: center;
            gap: 4px;
            z-index: 100;
        }

        .tab-button {
            transition: all 0.2s ease;
            opacity: 0.3;
            color: var(--text-main);
            font-weight: 700;
        }

        .tab-button.active {
            opacity: 1;
        }

        .timer-input {
            background: var(--flip-bg);
            border: 2px solid var(--sep-color);
            outline: none;
            color: var(--text-main);
            text-align: center;
            border-radius: 12px;
            width: 70px;
            padding: 12px 0;
            font-size: 1.6rem;
            font-weight: 700;
            transition: all 0.3s ease;
        }

        @media (min-width: 768px) {
            .timer-input {
                width: 100px;
                font-size: 2.2rem;
            }
        }

        .sep {
            color: var(--sep-color);
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 12px;
            font-size: 32px;
            transition: color 0.5s ease;
        }

        @media (min-width: 768px) {
            .sep {
                gap: 40px;
                font-size: 90px;
            }
        }

        body.large-view .sep {
            gap: 6vh !important;
            font-size: 12vh !important;
        }

        #quote-container {
            transition: opacity 0.6s ease;
            max-width: 1000px;
            text-align: center;
            min-height: 120px;
        }

        #quote-text {
            font-size: 1.5rem;
            line-height: 1.5;
            color: var(--text-main);
            opacity: 0.85;
            transition: color 0.5s ease;
        }

        #quote-author {
            font-size: 0.75rem;
            color: var(--text-main);
            opacity: 0.6;
            margin-top: 12px;
            transition: color 0.5s ease;
        }

        @media (min-width: 768px) {
            #quote-container {
                min-height: 160px;
            }
            #quote-text {
                font-size: 2.25rem;
            }
            #quote-author {
                font-size: 1rem;
            }
        }

        @media (min-width: 1024px) {
            #quote-text {
                font-size: 3rem;
            }
        }

        /* Large View styling for simulated/native fullscreen */
        body.large-view #quote-container {
            max-width: 90vw !important;
            min-height: 20vh !important;
        }

        body.large-view #quote-text {
            font-size: 4.5vh !important;
            line-height: 1.4 !important;
        }

        body.large-view #quote-author {
            font-size: 2vh !important;
            margin-top: 2vh !important;
        }

        #date-display {
            font-size: 0.875rem;
            font-weight: 600;
            color: var(--text-main);
            opacity: 0.7;
            letter-spacing: 0.3em;
            margin-top: 2rem;
            transition: color 0.5s ease;
        }

        @media (min-width: 768px) {
            #date-display {
                font-size: 1.25rem;
                margin-top: 3rem;
            }
        }

        body.large-view #date-display {
            font-size: 3vh !important;
            margin-top: 5vh !important;
        }





        /* Progress Bar styles */
        #progress-bar-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.05);
            z-index: 250;
        }
        .light-theme #progress-bar-container {
            background: rgba(0, 0, 0, 0.05);
        }
        #progress-bar {
            height: 100%;
            width: 100%;
            background-color: #3b82f6;
            transition: width 1s linear, background-color 0.5s ease;
        }

        .rule-input-container {
            max-height: 120px;
            overflow-y: auto;
            scrollbar-width: thin;
        }
        .rule-input-container::-webkit-scrollbar {
            width: 4px;
        }
        .rule-input-container::-webkit-scrollbar-track {
            background: transparent;
        }
        .rule-input-container::-webkit-scrollbar-thumb {
            background: var(--sep-color);
            border-radius: 4px;
        }
        .rule-item-input {
            background: var(--flip-bg);
            border: 2px solid var(--sep-color);
            outline: none;
            color: var(--text-main);
            border-radius: 10px;
            padding: 8px 12px;
            font-size: 0.825rem;
            font-weight: 500;
            transition: all 0.3s ease;
        }
        .rule-item-input:focus {
            border-color: #3b82f6;
        }

        /* Pre-Exam Rules Animations */
        @keyframes fadeInPage {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in-page {
            animation: fadeInPage 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes slideInRule {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }
        .rules-list-item {
            opacity: 0;
            animation: slideInRule 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        /* Apple/Google Developer continuous background blobs */
        @keyframes rotateBlob {
            0% {
                transform: translate(0px, 0px) rotate(0deg);
            }
            33% {
                transform: translate(30px, -50px) rotate(120deg);
            }
            66% {
                transform: translate(-20px, 20px) rotate(240deg);
            }
            100% {
                transform: translate(0px, 0px) rotate(360deg);
            }
        }
        
        .developer-bg {
            position: absolute;
            inset: 0;
            z-index: -1;
            overflow: hidden;
            border-radius: 24px;
            filter: blur(80px);
            opacity: 0.12;
            transition: opacity 0.5s ease;
            pointer-events: none;
        }
        
        .light-theme .developer-bg {
            opacity: 0.22;
        }

        .blob {
            position: absolute;
            width: 50%;
            height: 50%;
            border-radius: 50%;
            mix-blend-mode: multiply;
        }
        
        .light-theme .blob {
            mix-blend-mode: normal;
        }

        .blob-1 {
            top: -10%;
            left: -10%;
            background: radial-gradient(circle, #3b82f6 0%, rgba(59, 130, 246, 0) 70%);
            animation: rotateBlob 20s infinite alternate ease-in-out;
        }

        .blob-2 {
            bottom: -10%;
            right: -10%;
            background: radial-gradient(circle, #a855f7 0%, rgba(168, 85, 247, 0) 70%);
            animation: rotateBlob 25s infinite alternate-reverse ease-in-out;
        }
        
        .blob-3 {
            top: 40%;
            left: 30%;
            background: radial-gradient(circle, #14b8a6 0%, rgba(20, 184, 166, 0) 70%);
            animation: rotateBlob 22s infinite alternate ease-in-out;
            animation-delay: -5s;
        }
        .hidden {
            display: none !important;
        }

        .control-btn {
            background: var(--panel-bg);
            color: var(--text-dim);
            padding: 8px;
            border-radius: 50%;
            transition: all 0.2s ease;
        }

        .control-btn:hover {
            background: rgba(128, 128, 128, 0.15);
            color: var(--text-main);
        }

        .control-btn.active {
            color: #3b82f6;
            background: rgba(59, 130, 246, 0.1);
        }




    </style>
</head>

<body>

    <!-- Progress Bar -->
    <div id="progress-bar-container" class="hidden">
        <div id="progress-bar"></div>
    </div>

    <div id="wake-status" class="status-pill opacity-0 transition-opacity">
        <span class="w-1.5 h-1.5 rounded-full bg-blue-500 animate-pulse"></span>
        Stay Awake
    </div>



    <div id="main-panel" class="w-full max-w-6xl p-4 relative flex flex-col items-center">
        <div class="flex items-center space-x-6 mb-12 z-20">
            <div class="flex items-center space-x-2">
                <button onclick="toggleLargeView()" id="btn-fullscreen" class="control-btn" title="Toggle Large View">
                    <svg id="fullscreen-icon" width="18" height="18" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2">
                        <path
                            d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3">
                        </path>
                    </svg>
                </button>
                <button onclick="toggleTheme()" class="control-btn" title="Toggle Theme">
                    <svg id="theme-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2"></svg>
                </button>
                <button id="toggle-seconds" onclick="toggleSeconds()" class="control-btn active"
                    title="Show/Hide Seconds">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10"></circle>
                        <polyline points="12 6 12 12 16 14"></polyline>
                    </svg>
                </button>
            </div>

            <div class="flex space-x-10 text-[10px] font-bold uppercase tracking-[0.2em]">
                <button onclick="showTab('clock')" id="tab-clock" class="tab-button active">Clock</button>
                <button onclick="showTab('timer')" id="tab-timer" class="tab-button">Timer</button>
            </div>
        </div>



        <div id="view-clock" class="flex flex-col items-center">
            <div class="flex items-center" id="clock-digits"></div>
            <div id="date-display" class="uppercase"></div>
        </div>

        <div id="view-timer" class="hidden flex flex-col items-center">
            <div class="flex items-center mb-12 hidden" id="timer-digits"></div>

            <div id="timer-setup" class="flex flex-col items-center space-y-6 w-full max-w-md p-6 rounded-2xl bg-[var(--panel-bg)] border border-[var(--sep-color)]">
                <!-- Time Input Section -->
                <div class="flex flex-col items-center space-y-3 w-full">
                    <span class="text-[10px] tracking-widest uppercase font-bold text-gray-400">Set Countdown Duration</span>
                    <div class="flex items-center space-x-2 md:space-x-4">
                        <input type="number" id="input-hr" class="timer-input" value="00">
                        <div class="text-gray-400 font-bold">:</div>
                        <input type="number" id="input-min" class="timer-input" value="05">
                        <div class="text-gray-400 font-bold">:</div>
                        <input type="number" id="input-sec" class="timer-input" value="00">
                    </div>
                </div>

                <!-- Presets Section -->
                <div class="flex flex-wrap justify-center gap-2 w-full text-[10px] font-bold tracking-wider uppercase text-gray-500">
                    <button onclick="setPreset(0, 5, 0)" class="px-2.5 py-1 rounded-lg border border-gray-700/30 hover:bg-gray-500/10 hover:text-current transition-colors">5m</button>
                    <button onclick="setPreset(0, 10, 0)" class="px-2.5 py-1 rounded-lg border border-gray-700/30 hover:bg-gray-500/10 hover:text-current transition-colors">10m</button>
                    <button onclick="setPreset(0, 15, 0)" class="px-2.5 py-1 rounded-lg border border-gray-700/30 hover:bg-gray-500/10 hover:text-current transition-colors">15m</button>
                    <button onclick="setPreset(0, 30, 0)" class="px-2.5 py-1 rounded-lg border border-gray-700/30 hover:bg-gray-500/10 hover:text-current transition-colors">30m</button>
                    <button onclick="setPreset(1, 0, 0)" class="px-2.5 py-1 rounded-lg border border-gray-700/30 hover:bg-gray-500/10 hover:text-current transition-colors">1h</button>
                    <button onclick="setPreset(2, 0, 0)" class="px-2.5 py-1 rounded-lg border border-gray-700/30 hover:bg-gray-500/10 hover:text-current transition-colors">2h</button>
                </div>

                <hr class="w-full border-t border-[var(--sep-color)] opacity-30 my-1">

                <!-- Pre-Start Rules Setup Section -->
                <div class="flex flex-col items-center space-y-3 w-full">
                    <span class="text-[10px] tracking-widest uppercase font-bold text-gray-400">Pre-Start Rules (Optional)</span>
                    <div id="rules-input-container" class="rule-input-container flex flex-col space-y-2 w-full pr-1">
                        <!-- Rule inputs dynamically rendered here -->
                    </div>
                    <button type="button" onclick="addNewRuleInput()" class="text-[10px] font-bold text-blue-500 hover:text-blue-400 transition-colors uppercase tracking-wider flex items-center space-x-1 mt-1 cursor-pointer">
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="12" y1="5" x2="12" y2="19"></line>
                            <line x1="5" y1="12" x2="19" y2="12"></line>
                        </svg>
                        <span>Add Rule</span>
                    </button>
                </div>

                <hr class="w-full border-t border-[var(--sep-color)] opacity-20 my-1">

                <!-- Post-Exam Rules Setup Section -->
                <div class="flex flex-col items-center space-y-3 w-full">
                    <span class="text-[10px] tracking-widest uppercase font-bold text-gray-400">Post-Exam Rules (Optional)</span>
                    <div id="post-rules-input-container" class="rule-input-container flex flex-col space-y-2 w-full pr-1">
                        <!-- Post rule inputs dynamically rendered here -->
                    </div>
                    <button type="button" onclick="addNewPostRuleInput()" class="text-[10px] font-bold text-blue-500 hover:text-blue-400 transition-colors uppercase tracking-wider flex items-center space-x-1 mt-1 cursor-pointer">
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="12" y1="5" x2="12" y2="19"></line>
                            <line x1="5" y1="12" x2="19" y2="12"></line>
                        </svg>
                        <span>Add Rule</span>
                    </button>
                </div>

                <button onclick="reviewRulesOrStart()"
                    class="bg-blue-600 hover:bg-blue-500 text-white w-full py-3.5 rounded-xl font-bold text-xs tracking-widest uppercase transition-colors shadow-lg mt-2 cursor-pointer">Start Timer</button>
            </div>

            <!-- Pre-Start Rules Presentation Screen -->
            <div id="view-rules" class="hidden flex flex-col items-center w-full max-w-[98vw] px-4 py-4 animate-fade-in-page">
                <h2 class="text-2xl md:text-5xl font-bold tracking-wider text-center mb-10 uppercase opacity-90">Pre-Start Instructions</h2>
                <div class="w-full bg-[var(--panel-bg)] border border-[var(--sep-color)] rounded-3xl p-8 md:p-12 space-y-6 shadow-2xl relative overflow-hidden">
                    <div class="developer-bg">
                        <div class="blob blob-1"></div>
                        <div class="blob blob-2"></div>
                        <div class="blob blob-3"></div>
                    </div>
                    <ol id="rules-display-list" class="list-decimal list-inside text-lg md:text-3xl space-y-6 font-semibold opacity-85 leading-relaxed">
                        <!-- Rules listed here -->
                    </ol>
                </div>
                <div class="flex space-x-6 mt-12">
                    <button onclick="showTimerSetup()" class="bg-gray-500/20 hover:bg-gray-500/30 text-current px-10 py-4 rounded-xl text-sm tracking-widest uppercase transition-colors font-bold cursor-pointer">Back</button>
                    <button onclick="beginCountdown()" class="bg-blue-600 hover:bg-blue-500 text-white px-14 py-4 rounded-xl font-bold text-sm tracking-widest uppercase transition-colors shadow-xl cursor-pointer">Start Countdown</button>
                </div>
            </div>

            <!-- Post-Exam Rules Presentation Screen -->
            <div id="view-post-rules" class="hidden flex flex-col items-center w-full max-w-[98vw] px-4 py-4 animate-fade-in-page">
                <h2 class="text-2xl md:text-5xl font-bold tracking-wider text-center mb-10 uppercase opacity-90 text-red-500">Exam Concluded</h2>
                <div class="w-full bg-[var(--panel-bg)] border border-[var(--sep-color)] rounded-3xl p-8 md:p-12 space-y-6 shadow-2xl relative overflow-hidden">
                    <div class="developer-bg">
                        <div class="blob blob-1"></div>
                        <div class="blob blob-2"></div>
                        <div class="blob blob-3"></div>
                    </div>
                    <ol id="post-rules-display-list" class="list-decimal list-inside text-lg md:text-3xl space-y-6 font-semibold opacity-85 leading-relaxed">
                        <!-- Rules listed here -->
                    </ol>
                </div>
                <div class="flex space-x-6 mt-12">
                    <button onclick="stopTimer()" class="bg-blue-600 hover:bg-blue-500 text-white px-14 py-4 rounded-xl font-bold text-sm tracking-widest uppercase transition-colors shadow-xl cursor-pointer">Return to Setup</button>
                </div>
            </div>
            <div id="timer-running" class="hidden flex flex-col items-center space-y-6">
                <div class="flex space-x-4">
                    <button id="pause-btn" onclick="togglePause()"
                        class="bg-gray-500/20 text-current px-10 py-4 rounded-full text-xs tracking-widest uppercase transition-colors">Pause</button>
                    <button onclick="stopTimer()"
                        class="bg-red-500/10 text-red-500 px-10 py-4 rounded-full text-xs tracking-widest uppercase border border-red-500/20 transition-colors">Reset</button>
                </div>
                <div class="flex space-x-2 text-[10px] font-bold tracking-wider uppercase text-gray-500">
                    <button onclick="adjustTime(-300)" class="bg-gray-500/10 hover:bg-gray-500/20 px-4 py-2 rounded-lg transition-colors">-5m</button>
                    <button onclick="adjustTime(-60)" class="bg-gray-500/10 hover:bg-gray-500/20 px-4 py-2 rounded-lg transition-colors">-1m</button>
                    <button onclick="adjustTime(60)" class="bg-blue-600/10 text-blue-500 hover:bg-blue-600/20 px-4 py-2 rounded-lg transition-colors">+1m</button>
                    <button onclick="adjustTime(300)" class="bg-blue-600/10 text-blue-500 hover:bg-blue-600/20 px-4 py-2 rounded-lg transition-colors">+5m</button>
                </div>
            </div>
        </div>

        <div id="quote-wrapper" class="mt-16 flex items-center group">
            <button onclick="renderQuote(-1)" class="quote-nav-btn p-2" title="Previous Quote">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M15 18l-6-6 6-6" />
                </svg>
            </button>

            <div id="quote-container" class="px-6">
                <p id="quote-text" class="italic font-medium"></p>
                <span id="quote-author"
                    class="block uppercase tracking-widest font-semibold"></span>
            </div>

            <button onclick="renderQuote(1)" class="quote-nav-btn p-2" title="Next Quote">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M9 18l6-6-6-6" />
                </svg>
            </button>
        </div>
    </div>

    <audio id="beep-sound" src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg"></audio>

    <script>
        let showSeconds = true;

        function createDigitHTML(id) {
            return `
                <div id="${id}" class="flip-unit">
                    <div class="plate plate-top"><div class="digit-text">0</div></div>
                    <div class="plate plate-bottom"><div class="digit-text">0</div></div>
                    <div class="flap">
                        <div class="flap-front plate-top"><div class="digit-text">0</div></div>
                        <div class="flap-back plate-bottom"><div class="digit-text">0</div></div>
                    </div>
                </div>`;
        }

        const clockIds = ['c-h1', 'c-h2', 'c-m1', 'c-m2', 'c-s1', 'c-s2'];
        const timerIds = ['t-h1', 't-h2', 't-m1', 't-m2', 't-s1', 't-s2'];

        const clockContainer = document.getElementById('clock-digits');
        const timerContainer = document.getElementById('timer-digits');

        clockIds.forEach((id, i) => {
            clockContainer.innerHTML += createDigitHTML(id);
            if (i === 1) clockContainer.innerHTML += `<div id="sep-hm" class="sep"><div>•</div><div>•</div></div>`;
            if (i === 3) clockContainer.innerHTML += `<div id="sep-ms" class="sep"><div>•</div><div>•</div></div>`;
        });
        timerIds.forEach((id, i) => {
            timerContainer.innerHTML += createDigitHTML(id);
            if (i === 1) timerContainer.innerHTML += `<div id="sep-t-hm" class="sep"><div>•</div><div>•</div></div>`;
            if (i === 3) timerContainer.innerHTML += `<div id="sep-t-ms" class="sep"><div>•</div><div>•</div></div>`;
        });

        function flipTo(elementId, nextValue) {
            const unit = document.getElementById(elementId);
            if (!unit) return;

            const topStatic = unit.querySelector('.plate-top .digit-text');
            const bottomStatic = unit.querySelector('.plate-bottom .digit-text');
            const flap = unit.querySelector('.flap');
            const flapFront = unit.querySelector('.flap-front .digit-text');
            const flapBack = unit.querySelector('.flap-back .digit-text');

            const currentValue = bottomStatic.textContent;
            if (currentValue === nextValue) return;

            topStatic.textContent = nextValue;
            flapFront.textContent = currentValue;
            flapBack.textContent = nextValue;

            flap.classList.remove('flipping');

            requestAnimationFrame(() => {
                requestAnimationFrame(() => {
                    flap.classList.add('flipping');
                });
            });

            setTimeout(() => {
                bottomStatic.textContent = nextValue;
            }, 300);
        }

        function updateClock() {
            const now = new Date();
            const time = [
                String(now.getHours()).padStart(2, '0'),
                String(now.getMinutes()).padStart(2, '0'),
                String(now.getSeconds()).padStart(2, '0')
            ].join('').split('');

            clockIds.forEach((id, i) => {
                if (showSeconds || i < 4) {
                    flipTo(id, time[i]);
                }
            });
            document.getElementById('date-display').textContent = now.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' }).toUpperCase();
        }
        setInterval(updateClock, 1000);
        updateClock();

        function toggleSeconds() {
            showSeconds = !showSeconds;
            const btn = document.getElementById('toggle-seconds');
            const clockSUnits = [document.getElementById('c-s1'), document.getElementById('c-s2'), document.getElementById('sep-ms')];
            const timerSUnits = [document.getElementById('t-s1'), document.getElementById('t-s2'), document.getElementById('sep-t-ms')];

            btn.classList.toggle('active', showSeconds);
            clockSUnits.forEach(el => el.classList.toggle('hidden', !showSeconds));
            timerSUnits.forEach(el => el.classList.toggle('hidden', !showSeconds));
            document.body.classList.toggle('hide-seconds', !showSeconds);

            updateClock();
            refreshTimerUI();
        }

        let timerInt, timeLeft = 0, isPaused = false, timerDuration = 0;

        function setPreset(h, m, s) {
            document.getElementById('input-hr').value = String(h).padStart(2, '0');
            document.getElementById('input-min').value = String(m).padStart(2, '0');
            document.getElementById('input-sec').value = String(s).padStart(2, '0');
        }

        function adjustTime(seconds) {
            const timerRunning = !document.getElementById('timer-running').classList.contains('hidden');
            if (!timerRunning) return;

            if (timeLeft + seconds <= 0) {
                timeLeft = 0;
                clearInterval(timerInt);
                handleTimerEnd();
            } else {
                timeLeft += seconds;
                if (seconds > 0) {
                    timerDuration += seconds;
                }
                refreshTimerUI();
                updateProgressBar();
            }
        }

        const defaultRules = [
            "Find your name (alphabetical by last name, snaking front-to-back)",
            "Read cover page and sign it",
            "Remove caps / hats",
            "Have your IDs on the desk",
            "Remain quiet at all times",
            "You cannot leave in the first 30 minutes and last 5 minutes"
        ];

        let activeRules = [];
        try {
            const stored = localStorage.getItem('timer_rules');
            if (stored) {
                activeRules = JSON.parse(stored);
            } else {
                activeRules = [...defaultRules];
            }
        } catch (e) {
            activeRules = [...defaultRules];
        }

        function saveRules() {
            const container = document.getElementById('rules-input-container');
            if (!container) return;
            const inputs = container.querySelectorAll('.rule-item-input');
            activeRules = Array.from(inputs).map(input => input.value.trim()).filter(val => val !== '');
            localStorage.setItem('timer_rules', JSON.stringify(activeRules));
        }

        function renderRulesEditor() {
            const container = document.getElementById('rules-input-container');
            if (!container) return;
            container.innerHTML = '';
            activeRules.forEach((rule, idx) => {
                const itemDiv = document.createElement('div');
                itemDiv.className = 'flex items-center space-x-2 w-full group';
                itemDiv.innerHTML = `
                    <span class="text-xs font-bold text-gray-500 min-w-[14px]">${idx + 1}.</span>
                    <input type="text" class="rule-item-input flex-1" placeholder="Rule instruction..." value="${rule.replace(/"/g, '&quot;')}" oninput="saveRules()">
                    <button type="button" onclick="deleteRuleInput(${idx})" class="text-red-500 hover:text-red-400 p-1 rounded hover:bg-red-500/10 transition-colors opacity-0 group-hover:opacity-100 focus:opacity-100 cursor-pointer" title="Delete Rule">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="3 6 5 6 21 6"></polyline>
                            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                        </svg>
                    </button>
                `;
                container.appendChild(itemDiv);
            });
        }

        function addNewRuleInput() {
            saveRules();
            activeRules.push('');
            renderRulesEditor();
            const container = document.getElementById('rules-input-container');
            if (container) {
                const inputs = container.querySelectorAll('.rule-item-input');
                if (inputs.length > 0) {
                    inputs[inputs.length - 1].focus();
                }
            }
        }

        function deleteRuleInput(idx) {
            saveRules();
            activeRules.splice(idx, 1);
            renderRulesEditor();
            saveRules();
        }

        const defaultPostRules = [
            "Stop writing immediately and close your exam paper",
            "Remain seated and quiet until all exams are collected",
            "You need to hand in your formula sheet with your exam",
            "Exit the room quietly once dismissed by the proctor"
        ];

        let activePostRules = [];
        try {
            const storedPost = localStorage.getItem('timer_post_rules');
            if (storedPost) {
                activePostRules = JSON.parse(storedPost);
                // Migrate: automatically replace the old default ID verification instruction with the formula sheet instruction
                const oldIdRule = "Have your ID ready on your desk for verification";
                const idx = activePostRules.indexOf(oldIdRule);
                if (idx !== -1) {
                    activePostRules[idx] = "You need to hand in your formula sheet with your exam";
                    localStorage.setItem('timer_post_rules', JSON.stringify(activePostRules));
                }
            } else {
                activePostRules = [...defaultPostRules];
            }
        } catch (e) {
            activePostRules = [...defaultPostRules];
        }

        function savePostRules() {
            const container = document.getElementById('post-rules-input-container');
            if (!container) return;
            const inputs = container.querySelectorAll('.rule-item-input');
            activePostRules = Array.from(inputs).map(input => input.value.trim()).filter(val => val !== '');
            localStorage.setItem('timer_post_rules', JSON.stringify(activePostRules));
        }

        function renderPostRulesEditor() {
            const container = document.getElementById('post-rules-input-container');
            if (!container) return;
            container.innerHTML = '';
            activePostRules.forEach((rule, idx) => {
                const itemDiv = document.createElement('div');
                itemDiv.className = 'flex items-center space-x-2 w-full group';
                itemDiv.innerHTML = `
                    <span class="text-xs font-bold text-gray-500 min-w-[14px]">${idx + 1}.</span>
                    <input type="text" class="rule-item-input flex-1" placeholder="Rule instruction..." value="${rule.replace(/"/g, '&quot;')}" oninput="savePostRules()">
                    <button type="button" onclick="deletePostRuleInput(${idx})" class="text-red-500 hover:text-red-400 p-1 rounded hover:bg-red-500/10 transition-colors opacity-0 group-hover:opacity-100 focus:opacity-100 cursor-pointer" title="Delete Rule">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="3 6 5 6 21 6"></polyline>
                            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                        </svg>
                    </button>
                `;
                container.appendChild(itemDiv);
            });
        }

        function addNewPostRuleInput() {
            savePostRules();
            activePostRules.push('');
            renderPostRulesEditor();
            const container = document.getElementById('post-rules-input-container');
            if (container) {
                const inputs = container.querySelectorAll('.rule-item-input');
                if (inputs.length > 0) {
                    inputs[inputs.length - 1].focus();
                }
            }
        }

        function deletePostRuleInput(idx) {
            savePostRules();
            activePostRules.splice(idx, 1);
            renderPostRulesEditor();
            savePostRules();
        }

        function reviewRulesOrStart() {
            const h = parseInt(document.getElementById('input-hr').value) || 0;
            const m = parseInt(document.getElementById('input-min').value) || 0;
            const s = parseInt(document.getElementById('input-sec').value) || 0;
            timeLeft = (h * 3600) + (m * 60) + s;
            if (timeLeft <= 0) return;

            timerDuration = timeLeft;
            saveRules();

            if (activeRules.length > 0) {
                const list = document.getElementById('rules-display-list');
                if (list) {
                    list.innerHTML = '';
                    activeRules.forEach((rule, idx) => {
                        const li = document.createElement('li');
                        li.textContent = rule;
                        li.className = 'rules-list-item whitespace-nowrap';
                        li.style.animationDelay = `${idx * 100}ms`;
                        list.appendChild(li);
                    });
                }

                document.getElementById('timer-setup').classList.add('hidden');
                document.getElementById('view-rules').classList.remove('hidden');
            } else {
                beginCountdown();
            }
        }

        function beginCountdown() {
            const viewRules = document.getElementById('view-rules');
            if (viewRules) viewRules.classList.add('hidden');
            document.getElementById('timer-setup').classList.add('hidden');

            document.getElementById('progress-bar-container').classList.remove('hidden');
            updateProgressBar();

            document.getElementById('timer-digits').classList.remove('hidden');
            document.getElementById('timer-running').classList.remove('hidden');
            isPaused = false;
            runTimer();
        }

        function showTimerSetup() {
            const viewRules = document.getElementById('view-rules');
            if (viewRules) viewRules.classList.add('hidden');
            document.getElementById('timer-setup').classList.remove('hidden');
        }

        function updateProgressBar() {
            const percent = timerDuration > 0 ? (timeLeft / timerDuration) * 100 : 0;
            document.getElementById('progress-bar').style.width = `${percent}%`;
        }

        function runTimer() {
            clearInterval(timerInt);
            timerInt = setInterval(() => {
                if (!isPaused) {
                    timeLeft--;
                    refreshTimerUI();
                    updateProgressBar();
                    if (timeLeft <= 0) {
                        clearInterval(timerInt);
                        handleTimerEnd();
                    }
                }
            }, 1000);
            refreshTimerUI();
            updateProgressBar();
        }

        function handleTimerEnd() {
            document.getElementById('beep-sound').play().catch(() => { });

            // Clear countdown interval
            clearInterval(timerInt);
            timeLeft = 0;
            timerDuration = 0;

            // Hide clock digits, running overlay, progress bar
            document.getElementById('timer-digits').classList.add('hidden');
            document.getElementById('timer-running').classList.add('hidden');
            document.getElementById('progress-bar-container').classList.add('hidden');

            savePostRules();
            if (activePostRules.length > 0) {
                // Render and show post exam rules
                const list = document.getElementById('post-rules-display-list');
                if (list) {
                    list.innerHTML = '';
                    activePostRules.forEach((rule, idx) => {
                        const li = document.createElement('li');
                        li.textContent = rule;
                        li.className = 'rules-list-item whitespace-nowrap';
                        li.style.animationDelay = `${idx * 100}ms`;
                        list.appendChild(li);
                    });
                }
                document.getElementById('timer-setup').classList.add('hidden');
                document.getElementById('view-post-rules').classList.remove('hidden');

                // Reset countdown numbers on background plates
                timerIds.forEach(id => {
                    flipTo(id, '0');
                });
            } else {
                stopTimer();
            }
        }

        function refreshTimerUI() {
            const h = Math.floor(timeLeft / 3600);
            const m = Math.floor((timeLeft % 3600) / 60);
            const s = Math.max(0, timeLeft % 60);
            const timeStr = [String(h).padStart(2, '0'), String(m).padStart(2, '0'), String(s).padStart(2, '0')].join('').split('');
            timerIds.forEach((id, i) => {
                if (showSeconds || i < 4) {
                    flipTo(id, timeStr[i]);
                }
            });
        }

        function stopTimer() {
            clearInterval(timerInt);
            timeLeft = 0;
            timerDuration = 0;
            
            // Clean exam displays & states
            document.getElementById('timer-digits').classList.add('hidden');
            const viewRules = document.getElementById('view-rules');
            if (viewRules) viewRules.classList.add('hidden');
            const viewPostRules = document.getElementById('view-post-rules');
            if (viewPostRules) viewPostRules.classList.add('hidden');
            document.getElementById('timer-setup').classList.remove('hidden');
            document.getElementById('timer-running').classList.add('hidden');

            document.getElementById('progress-bar-container').classList.add('hidden');

            timerIds.forEach(id => {
                flipTo(id, '0');
            });
        }
        function togglePause() { isPaused = !isPaused; document.getElementById('pause-btn').textContent = isPaused ? 'Resume' : 'Pause'; }

        function showTab(tab) {
            document.getElementById('view-clock').classList.toggle('hidden', tab !== 'clock');
            document.getElementById('view-timer').classList.toggle('hidden', tab !== 'timer');
            document.getElementById('tab-clock').classList.toggle('active', tab === 'clock');
            document.getElementById('tab-timer').classList.toggle('active', tab === 'timer');

            // Persist tab selection
            localStorage.setItem('active_tab', tab);

            // Toggle quotes visibility (hide on timer pages entirely)
            const quoteWrapper = document.getElementById('quote-wrapper');
            if (quoteWrapper) {
                if (tab === 'clock') {
                    quoteWrapper.classList.remove('hidden');
                } else {
                    quoteWrapper.classList.add('hidden');
                }
            }
        }

        const engineeringQuotes = [
            { text: "Scientists study the world as it is; engineers create the world that has never been.", author: "Theodore von Kármán" },
            { text: "Any fool can make something complicated. It takes a genius to make it simple.", author: "Woody Guthrie" },
            { text: "Simplicity is the ultimate sophistication.", author: "Leonardo da Vinci" },
            { text: "Make things as simple as possible, but not simpler.", author: "Albert Einstein" },
            { text: "Anything that can go wrong will go wrong.", author: "Murphy's Law" },
            { text: "Move fast and break things. Unless you are a civil engineer.", author: "Engineering Proverb" },
            { text: "The best way to predict the future is to invent it.", author: "Alan Kay" },
            { text: "I have not failed. I've just found 10,000 ways that won't work.", author: "Thomas A. Edison" },
            { text: "If you can't explain it simply, you don't understand it well enough.", author: "Albert Einstein" },
            { text: "An engineer is someone who can do for a dime what any fool can do for a dollar.", author: "Arthur M. Wellington" },
            { text: "We build too many walls and not enough bridges.", author: "Isaac Newton" },
            { text: "Nature cannot be fooled.", author: "Richard Feynman" },
            { text: "Measure twice, cut once.", author: "Workshop Proverb" },
            { text: "One accurate measurement is worth a thousand expert opinions.", author: "Grace Hopper" },

            { text: "To the engineer, the world is a toybox full of sub-optimized tools.", author: "Unknown" },

            { text: "A problem well-stated is a problem half-solved.", author: "Charles Kettering" },
            { text: "It's not that I'm so smart, it's just that I stay with problems longer.", author: "Albert Einstein" },
            { text: "Design must serve people, reflecting the practical and aesthetic.", author: "Thomas J. Watson" },
            { text: "Nothing has such power to broaden the mind as systematic investigation.", author: "Marcus Aurelius" },
            { text: "Science is a way of thinking much more than it is a body of knowledge.", author: "Carl Sagan" },
            { text: "The best design is the one that gets out of the way.", author: "Dieter Rams" },
            { text: "In mathematics, proposing a question is of higher value than solving it.", author: "Georg Cantor" },
            { text: "If you want to understand the machine, look at the output.", author: "Workshop Proverb" },
            { text: "Action is the foundational key to all success.", author: "Pablo Picasso" },
            { text: "The history of engineering is the history of solving problems.", author: "Unknown" },
            { text: "A good tool is an opinionated tool.", author: "Unknown" },
            { text: "Detail is everything.", author: "Christian Dior" }
        ];

        let currentQuoteIndex = Math.floor(Math.random() * engineeringQuotes.length);

        function renderQuote(direction = 0) {
            const container = document.getElementById('quote-container');
            container.style.opacity = "0";
            setTimeout(() => {
                currentQuoteIndex = (currentQuoteIndex + direction + engineeringQuotes.length) % engineeringQuotes.length;
                const quote = engineeringQuotes[currentQuoteIndex];
                document.getElementById('quote-text').textContent = `"${quote.text}"`;
                document.getElementById('quote-author').textContent = `— ${quote.author}`;
                container.style.opacity = "1";
            }, 300);
        }

        window.addEventListener('load', () => {
            renderQuote(0);
            setInterval(() => {
                renderQuote(1);
            }, 90000);
            renderRulesEditor();
            renderPostRulesEditor();

            // Restore persistent tab selection
            const savedTab = localStorage.getItem('active_tab') || 'clock';
            showTab(savedTab);
        });

        function toggleLargeView() {
            const isLarge = document.body.classList.toggle('large-view');
            const btn = document.getElementById('btn-fullscreen');
            const icon = document.getElementById('fullscreen-icon');
            btn.classList.toggle('active', isLarge);
            if (isLarge) {
                if (document.documentElement.requestFullscreen) {
                    document.documentElement.requestFullscreen().catch(() => { });
                }
                icon.innerHTML = '<path d="M4 14h6v6M20 10h-6V4M14 20h-4v-6h6M10 4v6H4"></path>';
            } else {
                if (document.exitFullscreen && document.fullscreenElement) {
                    document.exitFullscreen().catch(() => { });
                }
                icon.innerHTML = '<path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"></path>';
            }
        }

        function updateThemeIcon() {
            const icon = document.getElementById('theme-icon');
            if (document.body.classList.contains('light-theme')) {
                icon.innerHTML = '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>';
            } else {
                icon.innerHTML = '<path d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m12.728 0l-.707-.707M6.343 6.343l-.707-.707M12 8a4 4 0 1 0 0 8 4 4 0 0 0 0-8z"></path>';
            }
        }

        function toggleTheme() {
            document.body.classList.toggle('light-theme');
            updateThemeIcon();
        }

        function applySystemTheme() {
            const prefersLight = window.matchMedia('(prefers-color-scheme: light)').matches;
            document.body.classList.toggle('light-theme', prefersLight);
            updateThemeIcon();
        }

        applySystemTheme();

        // Keyboard Shortcuts (Clicker Friendly)
        window.addEventListener('keydown', (e) => {
            const activeEl = document.activeElement;
            if (activeEl && (activeEl.tagName === 'INPUT' || activeEl.tagName === 'TEXTAREA')) {
                return; // Ignore if user is typing
            }

            if (e.code === 'Space') {
                e.preventDefault();
                const timerRunning = !document.getElementById('timer-running').classList.contains('hidden');
                if (timerRunning) {
                    togglePause();
                }
            } else if (e.code === 'KeyF') {
                e.preventDefault();
                toggleLargeView();
            } else if (e.code === 'Escape') {
                const timerRunning = !document.getElementById('timer-running').classList.contains('hidden');
                if (timerRunning) {
                    stopTimer();
                }
            } else if (e.code === 'KeyT') {
                e.preventDefault();
                const viewClock = document.getElementById('view-clock');
                if (viewClock.classList.contains('hidden')) {
                    showTab('clock');
                } else {
                    showTab('timer');
                }
            }
        });
    </script>
</body>

</html>
